<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Rekapitulasi Neraca Air</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg-body: #f4f7f9;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 40px 20px;
            background-color: var(--bg-body); 
            color: #333; 
        }

        .admin-container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: white; 
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-section h1 { 
            color: var(--secondary); 
            margin: 0 0 10px 0; 
            font-size: 28px; 
            font-weight: 800;
            letter-spacing: -1px;
        }

        .header-section .underline {
            width: 60px;
            height: 4px;
            background: var(--primary);
            margin: 0 auto;
            border-radius: 2px;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-group { display: flex; gap: 12px; }

        .btn {
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-refresh { background: #ebf5ff; color: var(--primary); }
        .btn-refresh:hover { background: var(--primary); color: white; }

        .btn-input { background: var(--success); color: white; }
        .btn-input:hover { background: #219150; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(39,174,96,0.3); }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        table { width: 100%; border-collapse: collapse; background: white; }
        
        thead th { 
            background-color: #f8fafc; 
            color: #64748b; 
            padding: 18px; 
            text-align: center; 
            border-bottom: 2px solid #edf2f7;
        }

        tbody td { 
            padding: 16px; 
            text-align: center; 
            border-bottom: 1px solid #f1f5f9;
        }

        /* PERBAIKAN TOMBOL OPSI */
        .btn-action-view { 
            background: #f3e8ff; 
            color: #7e22ce; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
        }

        .btn-action-delete { 
            background: #fee2e2; 
            color: #dc2626; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            margin-left: 8px;
        }
        .btn-action-delete:hover { background: #dc2626; color: white; }

        .loading { text-align: center; padding: 60px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h1>📊 DATA CENTER REKAPITULASI</h1>
        <div class="underline"></div>
        <p style="color: #64748b; margin-top: 10px; font-size: 14px;">Manajemen Database Neraca Air Daerah Irigasi</p>
    </div>

    <div class="action-bar">
        <div style="font-weight: bold; color: var(--secondary);">List Laporan Terbaru</div>
        <div class="btn-group">
            <button class="btn btn-refresh" onclick="muatData()">🔄 Refresh Data</button>
            <a href="index.html" class="btn btn-input">➕ Buat Laporan</a>
        </div>
    </div>

    <div id="loadingStatus" class="loading">Memulai koneksi database aman...</div>

    <div class="table-wrapper">
        <table id="tabelRekap" style="display:none;">
            <thead>
                <tr>
                    <th width="20%">Tanggal Update</th>
                    <th width="40%">Nama Daerah Irigasi</th>
                    <th width="40%">Opsi Kelola</th>
                </tr>
            </thead>
            <tbody id="isiTabel"></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://wcypnoofitfvqoexjhkg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjeXBub29maXRmdnFvZXhqaGtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTQ1ODEsImV4cCI6MjA5MTAzMDU4MX0.PC1mMJM39ECO9gstUB5R0UsHOZuZzeea4TvbDLg2lBU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Jalankan muat data saat pertama kali buka halaman
    window.onload = muatData;

    async function muatData() {
        const loading = document.getElementById('loadingStatus');
        const tabel = document.getElementById('tabelRekap');
        const tbody = document.getElementById('isiTabel');

        loading.style.display = 'block';
        tabel.style.display = 'none';
        tbody.innerHTML = '';

        try {
            const { data, error } = await _supabase
                .from('db_irigasi') 
                .select('*')
                .order('tgl_update', { ascending: false });

            if (error) throw error;

            if (data && data.length > 0) {
                data.forEach(row => {
                    const tgl = new Date(row.tgl_update).toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});
                    const jam = new Date(row.tgl_update).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-size: 13px;">${tgl} <br> <small style="color:#94a3b8">${jam} WIB</small></td>
                        <td style="text-align:left; padding-left: 30px;"><strong>${row.nama_di || 'TIDAK ADA NAMA'}</strong></td>
                        <td>
                            <button class="btn-action-view" onclick="lihatDetail('${row.id}')">👁️ Detail</button>
                            <button class="btn-action-delete" onclick="hapusData('${row.id}')">🗑️ Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                tabel.style.display = 'table';
                loading.style.display = 'none';
            } else {
                loading.innerText = "📭 Belum ada data tersimpan.";
            }
        } catch (err) {
            alert("Gagal ambil data: " + err.message);
            loading.innerText = "❌ Terjadi kesalahan koneksi.";
        }
    }

    // --- FUNGSI HAPUS DATA (DITAMBAHKAN) ---
    async function hapusData(id) {
        if (confirm("Apakah Anda yakin ingin menghapus laporan ini secara permanen dari database?")) {
            try {
                const { error } = await _supabase
                    .from('db_irigasi')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                alert("Data berhasil dihapus!");
                muatData(); // Refresh tabel setelah hapus
            } catch (err) {
                alert("Gagal menghapus data: " + err.message);
            }
        }
    }

    async function lihatDetail(id) {
        const { data, error } = await _supabase
            .from('db_irigasi')
            .select('data_tabel_html, nama_di')
            .eq('id', id)
            .single();

        if (data) {
            const win = window.open("", "_blank");
            win.document.write(`
                <html>
                <head>
                    <title>Laporan - ${data.nama_di}</title>
                    <style>
                        body { font-family: Arial; padding: 20px; }
                        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                        th, td { border: 1px solid black !important; padding: 6px; text-align: center; font-size: 11px; }
                        .no-print { display: none !important; }
                    </style>
                </head>
                <body>
                    <div>${data.data_tabel_html}</div>
                    <div style="margin-top: 30px; text-align: center;" class="no-print">
                        <button onclick="window.print()" style="padding: 10px 20px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 5px;">PRINT</button>
                    </div>
                </body>
                </html>
            `);
            win.document.close();
        }
    }
</script>
</body>
</html>
