<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Rekapitulasi Neraca Air</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg-body: #f4f7f9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 40px 20px;
            background-color: var(--bg-body); 
        }

        .admin-container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: white; 
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 { color: var(--secondary); margin: 0; font-size: 28px; font-weight: 800; }
        .underline { width: 60px; height: 4px; background: var(--primary); margin: 10px auto; border-radius: 2px; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-size: 14px; }
        .btn-refresh { background: #ebf5ff; color: var(--primary); }
        .btn-input { background: var(--success); color: white; }

        .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #f8fafc; color: #64748b; padding: 15px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #edf2f7; }
        tbody td { padding: 15px; text-align: center; border-bottom: 1px solid #f1f5f9; }

        .btn-action-view { background: #f3e8ff; color: #7e22ce; padding: 6px 12px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; }
        .btn-action-delete { background: none; color: var(--danger); border: none; margin-left: 10px; cursor: pointer; font-weight: 600; }
        .btn-action-delete:hover { text-decoration: underline; }

        .loading { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h1>📊 DATA CENTER REKAPITULASI</h1>
        <div class="underline"></div>
    </div>

    <div class="action-bar">
        <div style="font-weight: bold;">Daftar Laporan</div>
        <div class="btn-group">
            <button class="btn btn-refresh" onclick="muatData()">🔄 Refresh</button>
            <a href="index.html" class="btn btn-input">➕ Tambah</a>
        </div>
    </div>

    <div id="loadingStatus" class="loading">Menghubungkan ke database...</div>
    <div class="table-wrapper">
        <table id="tabelRekap" style="display:none;">
            <thead>
                <tr>
                    <th>Update</th>
                    <th>Nama Daerah Irigasi</th>
                    <th>Opsi</th>
                </tr>
            </thead>
            <tbody id="isiTabel"></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://wcypnoofitfvqoexjhkg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjeXBub29maXRmdnFvZXhqaGtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTQ1ODEsImV4cCI6MjA5MTAzMDU4MX0.PC1mMJM39ECO9gstUB5R0UsHOZuZzeea4TvbDLg2lBU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function muatData() {
        const loading = document.getElementById('loadingStatus');
        const tabel = document.getElementById('tabelRekap');
        const tbody = document.getElementById('isiTabel');
        loading.style.display = 'block';
        tabel.style.display = 'none';
        tbody.innerHTML = '';

        try {
            const { data, error } = await _supabase.from('db_irigasi').select('*').order('tgl_update', { ascending: false });
            if (error) throw error;
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(row.tgl_update).toLocaleDateString('id-ID')}</td>
                    <td style="text-align:left"><strong>${row.nama_di || 'No Name'}</strong></td>
                    <td>
                        <button class="btn-action-view" onclick="lihatDetail('${row.id}')">👁️ Detail</button>
                        <button class="btn-action-delete" onclick="hapusData('${row.id}')">Hapus</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            tabel.style.display = 'table';
            loading.style.display = 'none';
        } catch (e) { alert(e.message); }
    }

    async function lihatDetail(id) {
        const { data } = await _supabase.from('db_irigasi').select('*').eq('id', id).single();
        if (data) {
            const win = window.open("", "_blank");
            win.document.write(`
                <html>
                <head>
                    <title>Laporan - ${data.nama_di}</title>
                    <style>
                        body { font-family: Arial; padding: 20px; background: #fff; }
                        .container { width: 297mm; margin: 0 auto; }
                        #render-area table { width: 100%; border-collapse: collapse !important; border: 1px solid black !important; margin-top: 20px; }
                        #render-area th, #render-area td { border: 1px solid black !important; padding: 5px !important; text-align: center; font-size: 11px; }
                        /* CSS untuk Header ke Tengah */
                        #render-area h2, #render-area h3, #render-area p { text-align: center !important; width: 100%; margin: 5px 0; }
                        .no-print-area { text-align: center; margin-top: 30px; }
                        @media print { .no-print-area { display: none !important; } @page { size: landscape; margin: 1cm; } }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <div id="render-area">${data.data_tabel_html}</div>
                        <div class="no-print-area">
                            <button onclick="window.print()" style="padding: 10px 20px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">PRINT LAPORAN</button>
                        </div>
                    </div>
                </body>
                </html>
            `);
            win.document.close();
        }
    }

    async function hapusData(id) {
        if (confirm("Hapus data ini secara permanen?")) {
            try {
                const { error } = await _supabase.from('db_irigasi').delete().eq('id', id);
                if (error) throw error;
                alert("Berhasil dihapus!");
                muatData();
            } catch (e) { alert("Gagal hapus: " + e.message); }
        }
    }

    window.onload = muatData;
</script>
</body>
</html>
