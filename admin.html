<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Rekapitulasi Neraca Air</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: #2c3e50; margin: 0; font-size: 22px; letter-spacing: -0.5px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-refresh { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-refresh:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-input { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .btn-input:hover { background: #219150; transform: translateY(-2px); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; overflow: hidden; border-radius: 8px; }
        th { background-color: #34495e; color: white; padding: 15px; text-align: center; text-transform: uppercase; font-size: 12px; }
        td { border-bottom: 1px solid #eee; padding: 15px; text-align: center; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8fbff; }
        
        .loading { text-align: center; padding: 50px; font-style: italic; color: #95a5a6; font-size: 16px; }
        .btn-action-view { background: #8e44ad; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-action-view:hover { background: #7d3c98; }
        .btn-action-delete { color: #e74c3c; border: none; background: none; cursor: pointer; font-weight: bold; margin-left: 10px; text-decoration: underline; }
        .btn-action-delete:hover { color: #c0392b; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h1>📊 Data Center</h1>
        <div class="btn-group">
            <button class="btn-refresh" onclick="muatData()">🔄 Refresh Tabel</button>
            <a href="index.html" class="btn-input">➕ Buat Laporan Baru</a>
        </div>
    </div>

    <div id="loadingStatus" class="loading">Inisialisasi koneksi database...</div>

    <table id="tabelRekap" style="display:none;">
        <thead>
            <tr>
                <th width="20%">Tanggal Update</th>
                <th width="30%">Nama Daerah Irigasi</th>
                <th width="25%">Status Data</th>
                <th width="25%">Opsi Kelola</th>
            </tr>
        </thead>
        <tbody id="isiTabel"></tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = 'https://wcypnoofitfvqoexjhkg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjeXBub29maXRmdnFvZXhqaGtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTQ1ODEsImV4cCI6MjA5MTAzMDU4MX0.PC1mMJM39ECO9gstUB5R0UsHOZuZzeea4TvbDLg2lBU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function muatData() {
        const loading = document.getElementById('loadingStatus');
        const tabel = document.getElementById('tabelRekap');
        const tbody = document.getElementById('isiTabel');

        loading.style.display = 'block';
        loading.innerText = "⏳ Sedang mengambil data terbaru...";
        tabel.style.display = 'none';
        tbody.innerHTML = '';

        try {
            const { data, error } = await _supabase
                .from('db_irigasi') 
                .select('*')
                .order('tgl_update', { ascending: false });

            if (error) throw error;

            if (data && data.length > 0) {
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${new Date(row.tgl_update).toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'})}</td>
                        <td><strong>${row.nama_di || 'NONAME'}</strong></td>
                        <td><span style="color:#27ae60; font-weight:bold;">✅ Lengkap</span></td>
                        <td>
                            <button class="btn-action-view" onclick="lihatDetail('${row.id}')">👁️ Buka Laporan</button>
                            <button class="btn-action-delete" onclick="hapusData('${row.id}')">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                tabel.style.display = 'table';
                loading.style.display = 'none';
            } else {
                loading.innerText = "📭 Database kosong.";
            }
        } catch (err) {
            alert("Gagal ambil data: " + err.message);
            loading.innerText = "❌ Gagal memuat database.";
        }
    }

    async function lihatDetail(id) {
        const { data, error } = await _supabase
            .from('db_irigasi')
            .select('data_tabel_html, nama_di')
            .eq('id', id)
            .single();

        if (data) {
            const win = window.open("", "_blank");
            win.document.write(`
                <html>
                <head>
                    <title>Laporan - ${data.nama_di}</title>
                    <style>
                        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 40px; background: #fff; font-size: 11px; color: #000; }
                        .container { width: 210mm; margin: 0 auto; background: white; }
                        
                        /* --- INFO DATA DASAR (BERSIH/BORDERLESS) --- */
                        .info-table, .info-table table { width: 100%; border-collapse: collapse; border: none !important; margin-bottom: 20px; }
                        .info-table td { border: none !important; padding: 2px 0; vertical-align: top; text-align: left !important; }
                        .label { width: 180px; font-weight: bold; }
                        .sep { width: 15px; text-align: center !important; }

                        /* --- TABEL DATA (PAKAI GARIS) --- */
                        .main-table, table[id^="tabel"] { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                        .main-table th, .main-table td, 
                        table[id^="tabel"] th, table[id^="tabel"] td { 
                            border: 1px solid black !important; padding: 5px; text-align: center; 
                        }
                        
                        .text-left { text-align: left !important; padding-left: 8px !important; }
                        
                        /* MATIKAN STYLE EDITABLE SAAT DIBUKA */
                        [contenteditable="true"] { 
                            outline: none !important; 
                            cursor: default !important;
                        }

                        /* SEMBUNYIKAN TOMBOL DAN ALAT INPUT */
                        button, .btn-save, .btn-add, .admin-tools, [onclick*="tambahBaris"], .no-print, .btn-input { 
                            display: none !important; 
                        }

                        @media print {
                            body { padding: 0; }
                            .no-print-area { display: none !important; }
                        }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <div id="render-area">${data.data_tabel_html}</div>

                        <div style="margin-top: 50px; text-align: center;" class="no-print-area">
                            <hr>
                            <button onclick="window.print()" style="display:inline-block !important; padding: 12px 25px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 6px; font-weight:bold; font-size:14px;">🖨️ CETAK LAPORAN</button>
                            <button onclick="window.close()" style="display:inline-block !important; padding: 12px 25px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 6px; font-weight:bold; font-size:14px; margin-left:15px;">❌ TUTUP</button>
                        </div>
                    </div>

                    <script>
                        // MENGUNCI SEMUA INPUT AGAR TIDAK BISA DIKETIK
                        document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                            el.setAttribute('contenteditable', 'false');
                        });
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    }

    async function hapusData(id) {
        if(confirm("Hapus laporan ini secara permanen?")) {
            const { error } = await _supabase.from('db_irigasi').delete().eq('id', id);
            if (!error) muatData();
        }
    }

    window.onload = muatData;
</script>
</body>
</html>
